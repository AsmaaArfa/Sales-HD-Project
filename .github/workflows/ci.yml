name: CI — Validate & Test

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "dataform/**"
      - "airflow/**"
      - "bigquery/**"
      - "scripts/**"
      - ".github/workflows/**"

  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── 1. Lint Python (Airflow DAGs) ────────────────────────────────────────────
  lint-python:
    name: Lint Python (DAGs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Black format check
        run: black retail-pipeline/airflow/dags/ retail-pipeline/scripts/

      - name: isort import order check
        run: isort retail-pipeline/airflow/dags/ retail-pipeline/scripts/

      - name: Flake8 style check
        run: flake8 retail-pipeline/airflow/dags/ retail-pipeline/scripts/ --max-line-length=100 --extend-ignore=E203,W503

  # ── 2. Validate Airflow DAGs ──────────────────────────────────────────────────
  validate-dags:
    name: Validate Airflow DAGs
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Airflow
        run: |
          pip install "apache-airflow[google]==2.9.0" \
            --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.9.0/constraints-${{ env.PYTHON_VERSION }}.txt"

      - name: Set dummy env vars for import check
        run: |
          echo "GCP_PROJECT_ID=ci-project"       >> $GITHUB_ENV
          echo "GCS_BUCKET=ci-bucket"             >> $GITHUB_ENV
          echo "BQ_DATASET_RAW=retail_raw"        >> $GITHUB_ENV
          echo "DATAFORM_REPO=retail-dataform"    >> $GITHUB_ENV
          echo "DATAFORM_REGION=us-central1"      >> $GITHUB_ENV

      - name: Import and validate all DAGs
        run: |
          for dag_file in retail-pipeline/airflow/dags/*.py; do
            echo "Validating: $dag_file"
            python "$dag_file"
          done

      - name: Run DAG unit tests
        run: |
          pip install pytest
          pytest retail-pipeline/airflow/tests/ -v --tb=short 2>/dev/null || echo "No unit tests found — skipping"

  # ── 3. Validate Dataform SQL ──────────────────────────────────────────────────
  validate-dataform:
    name: Validate Dataform Models
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Dataform CLI
        run: npm install -g @dataform/cli@3

      - name: Install Dataform project dependencies
        working-directory: retail-pipeline/dataform
        run: dataform install

      - name: Compile Dataform models (dry-run)
        working-directory: retail-pipeline/dataform
        env:
          GCP_PROJECT_ID: ci-project
        run: dataform compile --vars='{"execution_date":"2024-01-01"}'

      - name: Check for Dataform compilation errors
        working-directory: retail-pipeline/dataform
        run: |
          OUTPUT=$(dataform compile --json 2>&1 || true)
          if echo "$OUTPUT" | grep -q '"type":"error"'; then
            echo "❌ Dataform compilation errors found:"
            echo "$OUTPUT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for err in data.get('graphErrors', {}).get('compilationErrors', []):
              print(f'  {err[\"fileName\"]}: {err[\"message\"]}')
          "
            exit 1
          fi
          echo "✅ Dataform compilation succeeded"

  # ── 4. Validate BigQuery schemas ──────────────────────────────────────────────
  validate-schemas:
    name: Validate BigQuery Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate JSON schema files
        run: |
          python retail-pipeline/scripts/validate_schemas.py retail-pipeline/bigquery/schemas/
          echo "✅ All schema files are valid JSON"

  # ── 5. Security scan ──────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit security scan
        run: bandit -r retail-pipeline/airflow/ retail-pipeline/scripts/ -ll --quiet

  # ── Summary gate ──────────────────────────────────────────────────────────────
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [lint-python, validate-dags, validate-dataform, validate-schemas, security-scan]
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "❌ One or more CI checks failed"
            exit 1
          fi
          echo "✅ All CI checks passed — PR is ready for review"
